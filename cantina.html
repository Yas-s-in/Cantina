  // Genera e inietta l'icona PWA come canvas → PNG base64, nessun file esterno
  (function(){
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');
    // Sfondo bordeaux scuro
    ctx.fillStyle = '#0d0608';
    ctx.beginPath();
    ctx.roundRect(0, 0, 512, 512, 80);
    ctx.fill();
    // Cerchio oro
    ctx.strokeStyle = 'rgba(201,168,76,0.35)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(256, 256, 210, 0, Math.PI * 2);
    ctx.stroke();
    // Emoji 🍷
    ctx.font = '260px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🍷', 258, 272);
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
    // Anche favicon standard
    const fav = document.createElement('link');
    fav.rel = 'icon'; fav.type = 'image/png';
    fav.href = c.toDataURL('image/png');
    document.head.appendChild(fav);
  })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0507;
      --bg2:     #110809;
      --bg3:     #1a0e10;
      --acc:     #7a1f30;
      --acc-l:   #9b2d42;
      --gold:    #c9a84c;
      --gold-l:  #e2c278;
      --gold-dim: rgba(201,168,76,0.1);
      --cream:   #f0e8d8;
      --muted:   #6a5a60;
      --text:    #ddd0c4;
      --border:  rgba(201,168,76,0.15);
      --safe-t:  env(safe-area-inset-top);
      --safe-b:  env(safe-area-inset-bottom);
      --radius:  10px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Jost', sans-serif; color: var(--text); }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 30% 0%, rgba(122,31,48,.2) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(122,31,48,.1) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    .header {
      flex-shrink: 0;
      padding: calc(var(--safe-t) + .9rem) 1.1rem .8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .ornament { font-size: .55rem; color: var(--gold); letter-spacing: .35em; text-transform: uppercase; opacity: .55; margin-bottom: .1rem; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1; }
    .title span { color: var(--gold); }
    .hbtn { background: var(--gold-dim); border: 1px solid var(--border); color: var(--gold); font-size: .85rem; cursor: pointer; padding: .45rem .55rem; border-radius: 8px; line-height: 1; }

    /* ── SEARCH ── */
    .search-bar { flex-shrink: 0; padding: .55rem .9rem; border-bottom: 1px solid var(--border); display: flex; gap: .5rem; align-items: center; }
    .search-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--cream); font-family: 'Jost', sans-serif; font-size: 16px; padding: .48rem .8rem; border-radius: 20px; outline: none; transition: border-color .2s; }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--gold); }
    .sort-btn { background: var(--gold-dim); border: 1px solid var(--border); color: var(--muted); font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; padding: .48rem .65rem; border-radius: 20px; cursor: pointer; white-space: nowrap; }
    .sort-btn.active { color: var(--gold); border-color: rgba(201,168,76,.3); }

    /* ── TABS ── */
    .tabs { flex-shrink: 0; display: flex; padding: .5rem .8rem 0; gap: .2rem; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Jost', sans-serif; font-size: .62rem; letter-spacing: .16em; text-transform: uppercase; padding: .44rem .82rem .54rem; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: .28rem; flex-shrink: 0; transition: color .2s; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-count { background: var(--acc); color: var(--gold-l); font-size: .5rem; padding: .07rem .26rem; border-radius: 8px; min-width: 14px; text-align: center; }

    /* ── STATS BAR ── */
    .stats-bar { flex-shrink: 0; padding: .42rem 1rem; display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,.2); }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-n { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); line-height: 1; }
    .stat-l { font-size: .48rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .stat-avg { margin-left: auto; font-size: .65rem; color: var(--muted); }
    .stat-avg b { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: .95rem; font-weight: 300; }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: .7rem .8rem calc(var(--safe-b) + 1rem); }

    /* ── ADD BTN ── */
    .add-btn { display: flex; align-items: center; justify-content: center; gap: .45rem; background: var(--gold-dim); border: 1px dashed rgba(201,168,76,.28); color: var(--gold); font-family: 'Jost', sans-serif; font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; padding: .62rem; cursor: pointer; width: 100%; margin-bottom: .65rem; border-radius: 8px; }
    .add-btn:active { background: rgba(201,168,76,.16); }

    /* ── CARDS ── */
    .wines-grid { display: flex; flex-direction: column; gap: .42rem; }

    /* :has() — stile card diverso se ha immagine */
    .wine-card { background: var(--bg2); border: 1px solid var(--border); padding: .82rem; display: grid; grid-template-columns: 50px 1fr auto; gap: .8rem; align-items: start; cursor: pointer; border-radius: var(--radius); -webkit-tap-highlight-color: transparent; transition: background .15s; }
    .wine-card:active { background: var(--bg3); }
    .wine-card:has(.wine-thumb img) { border-color: rgba(201,168,76,.22); }

    .wine-thumb { width: 50px; height: 65px; border: 1px solid var(--border); background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--acc); font-size: 1.2rem; flex-shrink: 0; overflow: hidden; border-radius: 6px; }
    .wine-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .wine-info { overflow: hidden; min-width: 0; }
    .wine-name { font-family: 'Cormorant Garamond', serif; font-size: 1.08rem; color: var(--cream); line-height: 1.2; margin-bottom: .1rem; }
    .wine-producer { font-size: .58rem; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin-bottom: .28rem; }
    .wine-meta { display: flex; flex-wrap: wrap; gap: .25rem; align-items: center; }
    .wine-tag { font-size: .53rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: var(--bg3); border: 1px solid rgba(122,106,112,.18); padding: .08rem .3rem; border-radius: 3px; }
    .wine-tag.gold { color: var(--gold); border-color: rgba(201,168,76,.2); background: rgba(201,168,76,.05); }
    .wine-price { font-size: .6rem; color: var(--gold); }
    .wine-stars-row { display: flex; gap: 1px; margin-top: .25rem; }
    .star { color: rgba(122,31,48,.35); font-size: .7rem; }
    .star.on { color: var(--gold); }
    .wine-notes-prev { font-size: .68rem; color: var(--muted); font-style: italic; margin-top: .2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Cormorant Garamond', serif; }
    .wine-actions { display: flex; flex-direction: column; gap: .2rem; align-items: flex-end; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: .8rem; padding: .12rem; line-height: 1; }
    .icon-btn:active { color: var(--gold); }
    .icon-btn.danger:active { color: #c0392b; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 3.5rem 1rem; }
    .empty-icon { font-size: 2rem; margin-bottom: .65rem; opacity: .22; }
    .empty-text { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-style: italic; color: var(--text); opacity: .32; margin-bottom: .22rem; }
    .empty-sub { font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; opacity: .22; }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-bottom: none; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; border-radius: 18px 18px 0 0; }
    .modal-handle { width: 30px; height: 3px; background: rgba(201,168,76,.18); border-radius: 2px; margin: .65rem auto .25rem; }
    .modal-head { padding: .65rem 1rem .75rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg2); z-index: 10; border-radius: 18px 18px 0 0; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-style: italic; color: var(--cream); }
    .modal-close { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); font-size: .78rem; cursor: pointer; padding: .26rem .45rem; border-radius: 6px; line-height: 1; }

    /* ── FORM ── */
    .modal-body { padding: .85rem 1rem 2rem; }
    .fg { margin-bottom: .85rem; }
    .fl { display: block; font-size: .56rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: .28rem; }
    input.fi, textarea.fi, select.fi {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--cream); font-family: 'Jost', sans-serif; font-size: 16px;
      padding: .58rem .72rem; outline: none; border-radius: 8px;
      -webkit-appearance: none; appearance: none; transition: border-color .2s;
    }
    input.fi:focus, textarea.fi:focus, select.fi:focus { border-color: var(--gold); }
    textarea.fi { resize: none; height: 72px; font-style: italic; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }

    .sec-sel { display: flex; gap: .28rem; margin-bottom: .85rem; background: var(--bg3); padding: .22rem; border-radius: 10px; }
    .sec-btn { flex: 1; background: none; border: none; color: var(--muted); font-family: 'Jost', sans-serif; font-size: .54rem; letter-spacing: .09em; text-transform: uppercase; padding: .38rem .12rem; cursor: pointer; border-radius: 7px; text-align: center; transition: all .2s; }
    .sec-btn.active { background: var(--acc); color: var(--gold-l); }

    .star-row { display: flex; gap: 4px; }
    .star-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: rgba(122,31,48,.25); padding: 0; line-height: 1; -webkit-text-stroke: 1.5px var(--acc); }
    .star-btn.on { color: var(--gold); -webkit-text-stroke: 0; }

    .img-up { border: 1px dashed var(--border); padding: .85rem; text-align: center; cursor: pointer; background: var(--bg3); border-radius: 8px; }
    .img-up-label { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .img-prev { width: 55px; height: 72px; object-fit: cover; margin: 0 auto .38rem; display: block; border: 1px solid var(--border); border-radius: 4px; }

    .submit-btn { width: 100%; background: var(--acc); border: none; color: var(--gold-l); font-family: 'Jost', sans-serif; font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; padding: .82rem; cursor: pointer; border-radius: 10px; margin-top: .32rem; transition: background .15s; }
    .submit-btn:active { background: var(--acc-l); }
    .outline-btn { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Jost', sans-serif; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; padding: .82rem; cursor: pointer; border-radius: 10px; transition: all .15s; }
    .outline-btn:active { border-color: var(--gold); color: var(--gold); }
    .btn-row { display: flex; gap: .45rem; }

    /* ── DETAIL ── */
    .detail-img-wrap { width: 100%; height: 190px; overflow: hidden; border-radius: 16px 16px 0 0; position: relative; cursor: zoom-in; }
    .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-img-tap { position: absolute; bottom: .5rem; right: .5rem; background: rgba(0,0,0,.55); color: var(--gold-l); font-size: .56rem; padding: .22rem .48rem; border-radius: 10px; letter-spacing: .09em; text-transform: uppercase; border: none; cursor: pointer; font-family: 'Jost', sans-serif; }
    .detail-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--cream); margin-bottom: .12rem; }
    .detail-prod { font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
    .detail-body { padding: .85rem 1rem 1.5rem; }
    .detail-stars-lg { display: flex; gap: 2px; margin: .5rem 0 .7rem; }
    .star-lg { font-size: 1.15rem; color: rgba(122,31,48,.28); }
    .star-lg.on { color: var(--gold); }
    .detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: .8rem; }
    .df { background: var(--bg3); border: 1px solid var(--border); padding: .55rem .65rem; border-radius: 8px; }
    .dfl { font-size: .52rem; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: .14rem; }
    .dfv { font-family: 'Cormorant Garamond', serif; font-size: .92rem; color: var(--text); font-style: italic; }
    .dfv.gold { color: var(--gold); }
    .detail-notes { background: var(--bg3); border: 1px solid var(--border); padding: .65rem; border-radius: 8px; margin-bottom: .8rem; }
    .detail-notes-text { font-family: 'Cormorant Garamond', serif; font-size: .92rem; color: var(--text); font-style: italic; line-height: 1.6; }
    .move-section { margin-bottom: .8rem; }
    .move-label { font-size: .54rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: .35rem; display: block; }
    .move-btns { display: flex; gap: .3rem; }
    .move-btn { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); font-family: 'Jost', sans-serif; font-size: .55rem; letter-spacing: .09em; text-transform: uppercase; padding: .42rem .25rem; cursor: pointer; border-radius: 7px; text-align: center; transition: all .15s; }
    .move-btn.curr { background: var(--acc); color: var(--gold-l); border-color: var(--acc); }
    .divider { border: none; border-top: 1px solid var(--border); margin: .65rem 0; }

    /* ── LIGHTBOX ── */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.96); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .lightbox img { max-width: 100%; max-height: 100dvh; object-fit: contain; }
    .lightbox-close { position: absolute; top: calc(var(--safe-t) + .7rem); right: .9rem; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: #fff; font-size: 1rem; padding: .35rem .55rem; border-radius: 8px; cursor: pointer; }

    /* ── SETTINGS ── */
    .settings-body { padding: .85rem 1rem 2.5rem; }
    .sett-section { margin-bottom: 1.1rem; }
    .sett-title { font-size: .56rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: .55rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border); }
    .stats-grid-s { display: grid; grid-template-columns: repeat(4, 1fr); gap: .32rem; margin-bottom: .8rem; }
    .stat-box { background: var(--bg3); border: 1px solid var(--border); padding: .65rem .28rem; text-align: center; border-radius: 8px; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: .48rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: .12rem; }
    .avg-line { text-align: center; font-size: .72rem; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-style: italic; margin-top: .2rem; }
    .avg-line b { color: var(--gold); font-weight: 300; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .42rem; }
    .theme-card { border: 2px solid var(--border); border-radius: 10px; padding: .55rem; cursor: pointer; text-align: center; background: var(--bg3); transition: border-color .2s; }
    .theme-card.active { border-color: var(--gold); }
    .theme-swatch { width: 100%; height: 26px; border-radius: 5px; margin-bottom: .28rem; }
    .theme-name { font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .sett-row { display: flex; gap: .38rem; margin-bottom: .38rem; }
    .sett-btn { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Jost', sans-serif; font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; padding: .68rem .32rem; cursor: pointer; border-radius: 8px; text-align: center; transition: all .15s; }
    .sett-btn:active { border-color: var(--gold); color: var(--gold); }
    .sett-btn.danger:active { border-color: #c0392b; color: #c0392b; }

    /* ── STORAGE INFO ── */
    .storage-info { font-size: .65rem; color: var(--muted); margin-top: .5rem; padding: .6rem .8rem; background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .storage-bar-wrap { height: 3px; background: var(--bg); border-radius: 2px; margin-top: .3rem; overflow: hidden; }
    .storage-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width .3s; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: calc(var(--safe-b) + 1.1rem); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); color: var(--gold); font-size: .65rem; letter-spacing: .1em; padding: .5rem .95rem; z-index: 300; white-space: nowrap; animation: fiu .2s ease; border-radius: 20px; pointer-events: none; }
    @keyframes fiu { from { opacity: 0; transform: translateX(-50%) translateY(5px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ─── THEMES ──────────────────────────────────────────────────────────────────
const THEMES = {
  bordeaux: { name:'Bordeaux', bg:'#0a0507', bg2:'#110809', bg3:'#1a0e10', acc:'#7a1f30', accl:'#9b2d42', gold:'#c9a84c', goldl:'#e2c278', cream:'#f0e8d8', muted:'#6a5a60', text:'#ddd0c4', border:'rgba(201,168,76,0.15)', swatch:'linear-gradient(135deg,#7a1f30,#c9a84c)' },
  notte:    { name:'Notte',    bg:'#06080f', bg2:'#0c1018', bg3:'#131820', acc:'#2a4a8a', accl:'#3a5fa8', gold:'#7eaadc', goldl:'#a8c8f0', cream:'#e8eef8', muted:'#4a5a70', text:'#c8d4e8', border:'rgba(126,170,220,0.15)', swatch:'linear-gradient(135deg,#2a4a8a,#7eaadc)' },
  foresta:  { name:'Foresta',  bg:'#060a07', bg2:'#0a0f0b', bg3:'#101810', acc:'#2a5a30', accl:'#3a7a40', gold:'#8ab870', goldl:'#b0d898', cream:'#e8f0e0', muted:'#4a5a45', text:'#c8d8b8', border:'rgba(138,184,112,0.15)', swatch:'linear-gradient(135deg,#2a5a30,#8ab870)' },
  ambra:    { name:'Ambra',    bg:'#080600', bg2:'#100e00', bg3:'#181500', acc:'#7a5010', accl:'#9a6820', gold:'#e0a830', goldl:'#f0c858', cream:'#f8f0d8', muted:'#685840', text:'#e0d0a8', border:'rgba(224,168,48,0.15)', swatch:'linear-gradient(135deg,#7a5010,#e0a830)' },
  ghiaccio: { name:'Ghiaccio', bg:'#f4f6fa', bg2:'#ffffff', bg3:'#edf0f5', acc:'#3a4a6a', accl:'#4a5a8a', gold:'#5a6888', goldl:'#3a4060', cream:'#1a2040', muted:'#8890a8', text:'#3a4060', border:'rgba(58,74,106,0.14)', swatch:'linear-gradient(135deg,#3a4a6a,#8890b0)' },
  rubino:   { name:'Rubino',   bg:'#0a0202', bg2:'#120404', bg3:'#1c0808', acc:'#9a1010', accl:'#c01818', gold:'#e88080', goldl:'#f0a8a8', cream:'#fde8e8', muted:'#6a4040', text:'#e8c8c8', border:'rgba(232,128,128,0.15)', swatch:'linear-gradient(135deg,#9a1010,#e88080)' },
};

const SECTIONS = [
  { id:'bevuti',    label:'Bevuti',    icon:'🍷' },
  { id:'wishlist',  label:'Wishlist',  icon:'✦'  },
  { id:'cantina',   label:'Cantina',   icon:'🏺' },
  { id:'preferiti', label:'Preferiti', icon:'★'  },
];
const SORT_CYCLE  = ['data','nome','voto','annata','prezzo'];
const SORT_LABELS = { data:'↕ Data', nome:'A→Z', voto:'★ Voto', annata:'📅 Anno', prezzo:'€ Prezzo' };

// ─── INDEXEDDB ───────────────────────────────────────────────────────────────
const DB_NAME    = 'cantina_db';
const DB_VERSION = 1;
const STORE_NAME = 'wines';
let   db         = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = () => reject(req.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}

function dbPutAll(wines) {
  return new Promise((resolve, reject) => {
    const tx    = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    // clear then re-insert all — simple and correct for our use-case
    store.clear();
    wines.forEach(w => store.put(w));
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

// ─── REACTIVE STATE (Proxy) ───────────────────────────────────────────────────
function createStore(initial) {
  let _saveTimer = null;

  const handler = {
    set(target, key, value) {
      target[key] = value;
      // Trigger DOM update on next frame (batch multiple changes)
      requestAnimationFrame(render);
      // Persist wines to IndexedDB with debounce (avoid hammering on rapid changes)
      if (key === 'wines') {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => {
          dbPutAll(target.wines).catch(err => console.error('IndexedDB save error:', err));
        }, 300);
      }
      return true;
    }
  };
  return new Proxy(initial, handler);
}

const state = createStore({
  wines:    [],
  tab:      'bevuti',
  modal:    null,
  form:     emptyForm('bevuti'),
  editId:   null,
  detail:   null,
  lightbox: null,
  toast:    null,
  toastTimer: null,
  search:   '',
  sort:     'data',
  theme:    localStorage.getItem('cantina_theme') || 'bordeaux',
  storageInfo: null,
});

function emptyForm(list) {
  return { name:'', producer:'', region:'', classification:'', grape:'', vintage:'', price:'', rating:0, notes:'', image:'', list: list || 'bevuti' };
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function applyTheme(id) {
  const t = THEMES[id] || THEMES.bordeaux;
  const r = document.documentElement.style;
  const props = { '--bg':t.bg,'--bg2':t.bg2,'--bg3':t.bg3,'--acc':t.acc,'--acc-l':t.accl,'--gold':t.gold,'--gold-l':t.goldl,'--cream':t.cream,'--muted':t.muted,'--text':t.text,'--border':t.border };
  // compute gold-dim from gold hex
  const [gr,gg,gb] = [1,3,5].map(i => parseInt(t.gold.slice(i,i+2),16));
  props['--gold-dim'] = `rgba(${gr},${gg},${gb},0.1)`;
  Object.entries(props).forEach(([k,v]) => r.setProperty(k,v));
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', t.bg);
}

// ─── RENDER (morphdom diffing) ────────────────────────────────────────────────
let _rendering = false;
function render() {
  if (_rendering) return;
  _rendering = true;
  applyTheme(state.theme);
  const html = buildApp();
  // morphdom diffs the existing DOM vs new HTML — only touches changed nodes
  morphdom(document.getElementById('app'), `<div id="app">${html}</div>`, {
    // Keep focus on active input elements (prevents keyboard dismissal)
    onBeforeElUpdated(from, to) {
      if (from === document.activeElement && (from.tagName === 'INPUT' || from.tagName === 'TEXTAREA')) {
        return false; // skip — don't replace the focused element
      }
      return true;
    }
  });
  bindEvents();
  _rendering = false;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function stars(n, total=5, cls='star') {
  return Array.from({ length:total }, (_,i) =>
    `<span class="${cls}${i < n ? ' on' : ''}">★</span>`
  ).join('');
}

function count(id) {
  return id === 'preferiti'
    ? state.wines.filter(w => w.fav).length
    : state.wines.filter(w => w.list === id).length;
}

function avgRating() {
  const rated = state.wines.filter(w => w.rating > 0);
  if (!rated.length) return null;
  return (rated.reduce((s,w) => s + w.rating, 0) / rated.length).toFixed(1);
}

function getFiltered() {
  let list = state.tab === 'preferiti'
    ? state.wines.filter(w => w.fav)
    : state.wines.filter(w => w.list === state.tab);

  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(w =>
      [w.name, w.producer, w.region, w.grape].some(s => (s||'').toLowerCase().includes(q))
    );
  }
  const sorters = {
    nome:   (a,b) => a.name.localeCompare(b.name),
    voto:   (a,b) => (b.rating||0) - (a.rating||0),
    annata: (a,b) => (b.vintage||0) - (a.vintage||0),
    prezzo: (a,b) => (parseFloat(a.price)||0) - (parseFloat(b.price)||0),
  };
  if (sorters[state.sort]) list = [...list].sort(sorters[state.sort]);
  return list;
}

// ─── BUILD HTML ───────────────────────────────────────────────────────────────
function buildApp() {
  const filtered = getFiltered();
  const avg      = avgRating();
  const { modal, toast, lightbox } = state;

  return `
    <div class="header">
      <div>
        <div class="ornament">✦ cantina</div>
        <h1 class="title">La mia <span>Cantina</span></h1>
      </div>
      <button class="hbtn" data-action="openSettings">⚙</button>
    </div>

    <div class="search-bar">
      <input
        class="search-input"
        id="search-input"
        placeholder="🔍 Cerca vino, produttore, vitigno…"
        value="${esc(state.search)}"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="sort-btn${state.sort !== 'data' ? ' active' : ''}" data-action="cycleSort">
        ${SORT_LABELS[state.sort]}
      </button>
    </div>

    <nav class="tabs">
      ${SECTIONS.map(s => `
        <button class="tab${state.tab === s.id ? ' active' : ''}" data-action="setTab" data-tab="${s.id}">
          ${s.icon} ${s.label}
          ${count(s.id) > 0 ? `<span class="tab-count">${count(s.id)}</span>` : ''}
        </button>
      `).join('')}
    </nav>

    ${state.wines.length ? `
      <div class="stats-bar">
        ${SECTIONS.map(s => `
          <div class="stat-item">
            <div class="stat-n">${count(s.id)}</div>
            <div class="stat-l">${s.label}</div>
          </div>
        `).join('')}
        ${avg ? `<div class="stat-avg">Media <b>${avg} ★</b></div>` : ''}
      </div>
    ` : ''}

    <div class="content">
      <button class="add-btn" data-action="openAdd">+ Aggiungi vino</button>
      ${filtered.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">🍷</div>
          <div class="empty-text">${state.search ? 'Nessun risultato' : 'Nessun vino qui'}</div>
          <div class="empty-sub">${state.search ? 'Prova altra ricerca' : 'Aggiungi il tuo primo vino'}</div>
        </div>
      ` : `
        <div class="wines-grid">
          ${filtered.map(buildCard).join('')}
        </div>
      `}
    </div>

    ${modal === 'add'      ? buildAddModal()      : ''}
    ${modal === 'detail'   ? buildDetailModal()   : ''}
    ${modal === 'settings' ? buildSettingsModal() : ''}
    ${lightbox             ? buildLightbox()       : ''}
    ${toast ? `<div class="toast">${toast}</div>` : ''}
  `;
}

function buildCard(w) {
  return `
    <div class="wine-card" data-action="openDetail" data-id="${w.id}">
      <div class="wine-thumb">
        ${w.image ? `<img src="${w.image}" alt="" loading="lazy"/>` : '🍾'}
      </div>
      <div class="wine-info">
        <div class="wine-name">${esc(w.name)}</div>
        ${w.producer ? `<div class="wine-producer">${esc(w.producer)}</div>` : ''}
        <div class="wine-meta">
          ${w.region         ? `<span class="wine-tag">${esc(w.region)}</span>`          : ''}
          ${w.grape          ? `<span class="wine-tag">${esc(w.grape)}</span>`           : ''}
          ${w.classification ? `<span class="wine-tag gold">${esc(w.classification)}</span>` : ''}
          ${w.vintage        ? `<span class="wine-tag">${esc(w.vintage)}</span>`         : ''}
          ${w.price          ? `<span class="wine-price">€${esc(w.price)}</span>`        : ''}
        </div>
        ${w.rating > 0 ? `<div class="wine-stars-row">${stars(w.rating)}</div>` : ''}
        ${w.notes ? `<div class="wine-notes-prev">${esc(w.notes)}</div>` : ''}
      </div>
      <div class="wine-actions">
        <button class="icon-btn" data-action="toggleFav" data-id="${w.id}">${w.fav ? '★' : '☆'}</button>
        <button class="icon-btn" data-action="editWine"  data-id="${w.id}">✎</button>
        <button class="icon-btn danger" data-action="delWine" data-id="${w.id}">✕</button>
      </div>
    </div>
  `;
}

function buildAddModal() {
  const f      = state.form;
  const isEdit = !!state.editId;
  return `
    <div class="overlay" data-action="closeModal">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <div class="modal-title">${isEdit ? 'Modifica vino' : 'Nuovo vino'}</div>
          <button class="modal-close" data-action="closeModal">✕</button>
        </div>
        <div class="modal-body">
          <div class="sec-sel">
            ${SECTIONS.filter(s => s.id !== 'preferiti').map(s => `
              <button class="sec-btn${f.list === s.id ? ' active' : ''}" data-action="setFormList" data-list="${s.id}">
                ${s.icon} ${s.label}
              </button>
            `).join('')}
          </div>

          <div class="fg">
            <label class="fl">Nome vino *</label>
            <input class="fi" id="f-name" placeholder="es. Groppello Classico" value="${esc(f.name)}" autocomplete="off"/>
          </div>
          <div class="fr">
            <div class="fg">
              <label class="fl">Produttore</label>
              <input class="fi" id="f-producer" placeholder="es. Cascina La Pertica" value="${esc(f.producer)}" autocomplete="off"/>
            </div>
            <div class="fg">
              <label class="fl">Vitigno / Uva</label>
              <input class="fi" id="f-grape" placeholder="es. Groppello" value="${esc(f.grape)}" autocomplete="off"/>
            </div>
          </div>
          <div class="fr">
            <div class="fg">
              <label class="fl">Regione / DOC</label>

              <label class="fl">Classificazione</label>
              <select class="fi" id="f-classification">
                <option value="">—</option>
                ${['DOCG','DOC','IGT','IGP','VdT','AOC','AOP','Vin de France','QbA','Prädikatswein','DO','DOCa'].map(c =>
                  `<option value="${c}"${f.classification === c ? ' selected' : ''}>${c}</option>`
                ).join('')}
              </select>

          </div>
          <div class="fr">
            <div class="fg">
              <label class="fl">Annata</label>
              <input class="fi" id="f-vintage" placeholder="2021" maxlength="4" value="${esc(f.vintage)}" inputmode="numeric"/>
            </div>
            <div class="fg">
              <label class="fl">Prezzo (€)</label>
              <input class="fi" id="f-price" placeholder="12.50" type="number" value="${esc(f.price)}" inputmode="decimal"/>
            </div>
          </div>

          <div class="fg">
            <label class="fl">Punteggio</label>
            <div class="star-row">
              ${[1,2,3,4,5].map(i =>
                `<button class="star-btn${i <= f.rating ? ' on' : ''}" data-action="setRating" data-val="${i}">★</button>`
              ).join('')}

          <div class="fg">
            <label class="fl">Note di degustazione</label>
            <textarea class="fi" id="f-notes" placeholder="Aromi, sapori, impressioni…">${esc(f.notes)}</textarea>

            <label class="fl">Foto etichetta</label>
            <div class="img-up" data-action="triggerImg">
              <input type="file" id="img-input" accept="image/*" style="display:none"/>
              ${f.image ? `<img class="img-prev" src="${f.image}" alt=""/>` : ''}
              <div class="img-up-label">${f.image ? '📷 Cambia foto' : '📷 Carica etichetta'}</div>
            </div>

          <button class="submit-btn" data-action="saveWine">
            ${isEdit ? 'Salva modifiche' : 'Aggiungi alla cantina'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function buildDetailModal() {

  if (!w) return '';
  const metaFields = [
    w.region         && { l:'Regione',    v:w.region },
    w.grape          && { l:'Vitigno',    v:w.grape },
    w.classification && { l:'Classif.',   v:w.classification, gold:true },
    w.vintage        && { l:'Annata',     v:w.vintage },
    w.price          && { l:'Prezzo',     v:`€${w.price}` },
  ].filter(Boolean);

  return `
    <div class="overlay" data-action="closeModal">
      <div class="modal">
        <div class="modal-handle"></div>
        ${w.image ? `
          <div class="detail-img-wrap" data-action="openLightbox">
            <img src="${w.image}" alt=""/>
            <button class="detail-img-tap" data-action="openLightbox">🔍 Ingrandisci</button>
          </div>
        ` : ''}
        <div class="modal-head">
          <div style="flex:1;min-width:0">
            <div class="detail-name">${esc(w.name)}</div>
            ${w.producer ? `<div class="detail-prod">${esc(w.producer)}</div>` : ''}
          </div>
          <button class="modal-close" data-action="closeModal">✕</button>
        </div>
        <div class="detail-body">
          ${w.rating > 0 ? `<div class="detail-stars-lg">${stars(w.rating, 5, 'star-lg')}</div>` : ''}

          ${metaFields.length ? `
            <div class="detail-meta-grid">
              ${metaFields.map(f => `
                <div class="df">
                  <div class="dfl">${f.l}</div>
                  <div class="dfv${f.gold ? ' gold' : ''}">${esc(f.v)}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}

          ${w.notes ? `
            <div class="detail-notes">
              <div class="dfl" style="margin-bottom:.28rem">Note di degustazione</div>
              <div class="detail-notes-text">${esc(w.notes)}</div>
            </div>
          ` : ''}

          <div class="move-section">
            <span class="move-label">Sposta in sezione</span>
            <div class="move-btns">
              ${SECTIONS.filter(s => s.id !== 'preferiti').map(s => `
                <button class="move-btn${w.list === s.id ? ' curr' : ''}" data-action="moveSection" data-section="${s.id}">
                  ${s.icon} ${s.label}
                </button>
              `).join('')}
            </div>
          </div>

          <hr class="divider"/>
          <div class="btn-row">
            <button class="submit-btn" style="margin-top:0" data-action="editFromDetail">✎ Modifica</button>
            <button class="outline-btn" data-action="toggleFavDetail">
              ${w.fav ? '★ Preferito' : '☆ Preferiti'}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildLightbox() {
  return `
    <div class="lightbox" data-action="closeLightbox">
      <img src="${state.lightbox}" alt=""/>
      <button class="lightbox-close" data-action="closeLightbox">✕</button>

  const avg = avgRating();

  return `
    <div class="overlay" data-action="closeModal">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <div class="modal-title">Impostazioni</div>
          <button class="modal-close" data-action="closeModal">✕</button>
        </div>
        <div class="settings-body">

          <div class="sett-section">
            <div class="sett-title">Statistiche</div>
            <div class="stats-grid-s">
              ${SECTIONS.map(s => `
                <div class="stat-box">
                  <div class="stat-num">${count(s.id)}</div>
                  <div class="stat-lbl">${s.label}</div>
                </div>
              `).join('')}
            </div>
            ${avg ? `<div class="avg-line">Media punteggi: <b>${avg} ★</b></div>` : ''}
          </div>

          <div class="sett-section">
            <div class="sett-title">Tema colore</div>
            <div class="theme-grid">
              ${Object.entries(THEMES).map(([id,t]) => `
                <div class="theme-card${state.theme === id ? ' active' : ''}" data-action="setTheme" data-theme="${id}">
                  <div class="theme-swatch" style="background:${t.swatch}"></div>
                  <div class="theme-name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="sett-section">
            <div class="sett-title">Backup & Ripristino</div>
            <div class="sett-row">
              <button class="sett-btn" data-action="exportJSON">↓ Esporta JSON</button>
              <button class="sett-btn" data-action="triggerImport">↑ Importa JSON</button>
              <input type="file" id="import-input" accept=".json" style="display:none"/>
            </div>
            ${si ? `
              <div class="storage-info">
                <span>💾 IndexedDB · ${si.count} vini · ~${si.sizeMB} MB</span>
                <span style="color:var(--gold)">${si.images} foto</span>
              </div>

          </div>

          <div class="sett-section">
            <div class="sett-row">

        </div>

// ─── EVENTS ──────────────────────────────────────────────────────────────────
let _eventsBound = false;
function bindEvents() {
  if (_eventsBound) return;
  _eventsBound = true;

  const root = document.getElementById('app');
  root.addEventListener('click',  handleClick);
  root.addEventListener('change', handleChange);

  // Search: use event delegation on app so we don't need to rebind
  root.addEventListener('input', e => {
    if (e.target.id === 'search-input') {
      state.search = e.target.value;
      updateContentOnly();
      return;
    }
    // Form fields: silent sync
    const formFields = ['f-name','f-producer','f-region','f-vintage','f-price','f-notes','f-grape','f-classification'];
    if (formFields.includes(e.target.id)) {
      syncFormSilent();
    }
  });
}

// Sync form fields into state without triggering render
function syncFormSilent() {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const cl = document.getElementById('f-classification');
  // Mutate directly bypassing Proxy to avoid re-render
  Object.assign(state.form, {
    name:           g('f-name'),
    producer:       g('f-producer'),
    region:         g('f-region'),
    grape:          g('f-grape'),
    vintage:        g('f-vintage'),
    price:          g('f-price'),
    notes:          g('f-notes'),
    classification: cl ? cl.value : '',
  });
}

// Update only the wine list (no full re-render)
function updateContentOnly() {
  const filtered = getFiltered();
  const grid     = document.querySelector('.wines-grid');
  const empty    = document.querySelector('.empty');
  const content  = document.querySelector('.content');
  if (!content) return;

  if (filtered.length === 0) {
    if (grid)  grid.remove();
    if (!empty) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.innerHTML = `<div class="empty-icon">🍷</div>
        <div class="empty-text">${state.search ? 'Nessun risultato' : 'Nessun vino qui'}</div>
        <div class="empty-sub">${state.search ? 'Prova altra ricerca' : 'Aggiungi il tuo primo vino'}</div>`;
      content.appendChild(div);
    }
  } else {
    if (empty) empty.remove();
    const newHtml = `<div class="wines-grid">${filtered.map(buildCard).join('')}</div>`;
    if (grid) {
      morphdom(grid, newHtml);
    } else {
      content.insertAdjacentHTML('beforeend', newHtml);
    }
  }
}

function handleChange(e) {
  if (e.target.id === 'f-classification') syncFormSilent();

  if (e.target.id === 'img-input') {
    const file = e.target.files[0];
    if (!file) return;
    // Compress image before storing to keep JSON size manageable
    compressImage(file, 800).then(b64 => {
      state.form.image = b64;
      render();
    });
  }

  if (e.target.id === 'import-input') {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('not array');
        state.wines = data;
        showToast(`✓ ${data.length} vini importati`);
        state.modal = null;
      } catch {
        showToast('✗ File non valido');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
}

// Compress image to max width px, returns base64
function compressImage(file, maxW) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const ratio  = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = url;
  });
}

function handleClick(e) {
  const btn    = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  switch (action) {
    case 'setTab':
      state.tab    = btn.dataset.tab;
      state.search = '';
      break;

    case 'openAdd':
      state.form   = emptyForm(state.tab === 'preferiti' ? 'bevuti' : state.tab);
      state.editId = null;
      state.modal  = 'add';
      break;

    case 'openSettings':
      // Compute storage info before opening settings
      computeStorageInfo().then(info => {
        state.storageInfo = info;
        state.modal = 'settings';
      });
      break;

    case 'closeModal':
      if (e.target === btn || btn.classList.contains('modal-close') || e.target.classList.contains('overlay')) {
        state.modal  = null;
        state.detail = null;
      }
      break;

    case 'closeLightbox': state.lightbox = null; break;

    case 'openLightbox':
      if (state.detail?.image) state.lightbox = state.detail.image;
      break;

    case 'setFormList':
      syncFormSilent();
      state.form = { ...state.form, list: btn.dataset.list };
      break;

    case 'setRating': {
      const v = parseInt(btn.dataset.val);
      syncFormSilent();
      state.form = { ...state.form, rating: state.form.rating === v ? 0 : v };
      break;
    }

    case 'triggerImg':
      document.getElementById('img-input')?.click();
      break;

    case 'cycleSort': {
      const ci     = SORT_CYCLE.indexOf(state.sort);
      state.sort   = SORT_CYCLE[(ci + 1) % SORT_CYCLE.length];
      break;
    }

    case 'saveWine': {
      syncFormSilent();
      if (!state.form.name.trim()) { showToast('✗ Inserisci il nome del vino'); return; }
      const updated = state.editId
        ? state.wines.map(w => w.id === state.editId ? { ...state.form, id: state.editId } : w)
        : [...state.wines, { ...state.form, id: Date.now() }];
      state.wines  = updated;
      state.modal  = null;
      state.editId = null;
      showToast('✓ Vino salvato');
      break;
    }

    case 'openDetail':
      state.detail = state.wines.find(w => w.id == btn.dataset.id);
      state.modal  = 'detail';
      break;

    case 'editWine':
      e.stopPropagation();
      { const w = state.wines.find(w => w.id == btn.dataset.id);
        if (w) { state.form = { ...w }; state.editId = w.id; state.modal = 'add'; } }
      break;

    case 'editFromDetail':
      if (state.detail) { state.form = { ...state.detail }; state.editId = state.detail.id; state.modal = 'add'; }
      break;

    case 'delWine':
      e.stopPropagation();
      if (confirm('Eliminare questo vino?')) {
        state.wines = state.wines.filter(w => w.id != btn.dataset.id);
      }
      break;

    case 'toggleFav':
      e.stopPropagation();
      state.wines = state.wines.map(w => w.id == btn.dataset.id ? { ...w, fav: !w.fav } : w);
      break;

    case 'toggleFavDetail':
      if (state.detail) {
        state.wines  = state.wines.map(w => w.id === state.detail.id ? { ...w, fav: !w.fav } : w);
        state.detail = { ...state.detail, fav: !state.detail.fav };
      }
      break;

    case 'moveSection':
      if (state.detail) {
        const sec    = btn.dataset.section;
        state.wines  = state.wines.map(w => w.id === state.detail.id ? { ...w, list: sec } : w);
        state.detail = { ...state.detail, list: sec };
        showToast(`✓ Spostato in ${sec}`);
      }
      break;

    case 'setTheme':
      state.theme = btn.dataset.theme;
      localStorage.setItem('cantina_theme', state.theme);
      break;

    case 'exportJSON': {
      const json = JSON.stringify(state.wines, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'cantina_backup.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast(`✓ Backup esportato (${(json.length / 1024 / 1024).toFixed(1)} MB)`);
      localStorage.setItem('cantina_last_backup', String(Date.now()));
      break;
    }

    case 'triggerImport':
      document.getElementById('import-input')?.click();
      break;

    case 'clearAll':
      if (confirm('Eliminare tutti i vini? Non è reversibile.')) {
        state.wines = [];
        state.modal = null;
        showToast('✓ Cantina svuotata');
      }
      break;
  }
}

function showToast(msg) {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  // Mutate directly to avoid double render
  Object.assign(state, { toast: msg });
  render();
  state.toastTimer = setTimeout(() => {
    Object.assign(state, { toast: null });
    render();
  }, 2500);
}

// Compute approximate storage usage
async function computeStorageInfo() {
  const json     = JSON.stringify(state.wines);
  const sizeMB   = (new TextEncoder().encode(json).length / 1024 / 1024).toFixed(2);
  const images   = state.wines.filter(w => w.image).length;
  return { count: state.wines.length, sizeMB, images };
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    await openDB();
    const wines   = await dbGetAll();
    // Bypass Proxy for initial load (no need to trigger save back)
    Object.assign(state, { wines });
  } catch (err) {
    console.warn('IndexedDB unavailable, falling back to localStorage', err);
    try {
      const stored = localStorage.getItem('cantina_v1');
      if (stored) Object.assign(state, { wines: JSON.parse(stored) });
    } catch {}
  }
  render();
  checkBackupReminder();
}

function checkBackupReminder() {
  if (!state.wines.length) return;
  const last     = parseInt(localStorage.getItem('cantina_last_backup') || '0');
  const now      = Date.now();
  const daysSince = (now - last) / 86_400_000;
  if (!last || daysSince >= 7) {
    setTimeout(() => {
      if (confirm(`💾 Vuoi salvare un backup?\n${state.wines.length} vini · apri Impostazioni → Esporta JSON`)) {
        // trigger export
        const json = JSON.stringify(state.wines, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url; a.download = 'cantina_backup.json'; a.click();
        URL.revokeObjectURL(url);
        localStorage.setItem('cantina_last_backup', String(now));
        showToast('✓ Backup salvato');
      } else {
        localStorage.setItem('cantina_last_backup', String(now));
      }
    }, 1000);
  }
}

init();
</script>

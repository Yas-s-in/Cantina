  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111318; --bg2: #1a1d24; --bg3: #22262f;
      --acc: #4f6ef7; --acc-l: #6b85f8;
      --gold: #e8b86d; --gold-l: #f5d08a; --gold-dim: rgba(232,184,109,0.1);
      --text: #e8eaf0; --text2: #9ca3b0; --text3: #5a6070;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --card: #1e2129; --card-hover: #252930;
      --green: #4caf82; --red: #e05252; --amber: #e8943a;
      --safe-t: env(safe-area-inset-top); --safe-b: env(safe-area-inset-bottom);
      --r: 12px; --r-sm: 8px; --r-xs: 6px;
    }
    .theme-light {
      --bg: #f0f2f7; --bg2: #ffffff; --bg3: #e8ebf2;
      --acc: #4f6ef7; --acc-l: #3d5be0;
      --gold: #c47f20; --gold-l: #a86b12; --gold-dim: rgba(196,127,32,0.1);
      --text: #1a1d24; --text2: #4a5060; --text3: #9ca3b0;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
      --card: #ffffff; --card-hover: #f5f7fc;
      --green: #2e8a5e; --red: #c0392b; --amber: #c47020;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Inter', sans-serif; color: var(--text); font-size: 14px; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg); }

    /* ── HEADER ── */
    .header { flex-shrink: 0; padding: calc(var(--safe-t) + .85rem) 1rem .75rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); }
    .header-brand { display: flex; flex-direction: column; }
    .brand-label { font-size: .55rem; color: var(--text3); letter-spacing: .3em; text-transform: uppercase; margin-bottom: .1rem; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; font-style: italic; color: var(--text); line-height: 1; }
    .brand-name span { color: var(--gold); }
    .header-actions { display: flex; gap: .5rem; }
    .hbtn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: .8rem; cursor: pointer; padding: .42rem .55rem; border-radius: var(--r-sm); line-height: 1; transition: all .15s; }
    .hbtn:active { background: var(--border2); color: var(--text); }
    .hbtn.accent { background: var(--acc); border-color: var(--acc); color: #fff; }

    /* ── TABS ── */
    .tabs { flex-shrink: 0; display: flex; padding: 0 1rem; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; background: var(--bg); }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-family: 'Inter', sans-serif; font-size: .65rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; padding: .75rem .85rem .65rem; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: .3rem; flex-shrink: 0; transition: color .15s; }
    .tab.active { color: var(--acc); border-bottom-color: var(--acc); }
    .tab-count { background: var(--acc); color: #fff; font-size: .5rem; font-weight: 600; padding: .08rem .3rem; border-radius: 20px; min-width: 16px; text-align: center; }

    /* ── TOOLBAR (search + filter + sort) ── */
    .toolbar { flex-shrink: 0; padding: .6rem 1rem; display: flex; gap: .5rem; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
    .search-wrap { flex: 1; position: relative; }
    .search-icon { position: absolute; left: .65rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .8rem; pointer-events: none; }
    .search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: .48rem .75rem .48rem 2rem; border-radius: 20px; outline: none; transition: border-color .2s; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--acc); }
    .toolbar-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: .72rem; font-weight: 500; padding: .48rem .65rem; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: all .15s; display: flex; align-items: center; gap: .3rem; }
    .toolbar-btn.active { background: var(--acc); border-color: var(--acc); color: #fff; }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: .75rem 1rem calc(var(--safe-b) + 1rem); }

    /* ── ADD BTN ── */
    .add-btn { display: flex; align-items: center; justify-content: center; gap: .5rem; background: var(--acc); border: none; color: #fff; font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .05em; padding: .7rem; cursor: pointer; width: 100%; margin-bottom: .75rem; border-radius: var(--r); transition: background .15s; }
    .add-btn:active { background: var(--acc-l); }

    /* ── STATS STRIP ── */
    .stats-strip { display: flex; gap: .5rem; margin-bottom: .75rem; overflow-x: auto; scrollbar-width: none; padding-bottom: .1rem; }
    .stats-strip::-webkit-scrollbar { display: none; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: .5rem .8rem; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; min-width: 64px; }
    .stat-chip-n { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--gold); line-height: 1; }
    .stat-chip-l { font-size: .52rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-top: .1rem; }

    /* ── WINE CARDS ── */
    .wines-grid { display: flex; flex-direction: column; gap: .5rem; }
    .wine-card-wrap { position: relative; overflow: hidden; border-radius: var(--r); }
    .wine-card-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; align-items: center; gap: 1px; transform: translateX(100%); transition: transform .22s ease; }
    .wine-card-wrap.swiped .wine-card-actions { transform: translateX(0); }
    .swipe-action { height: 100%; min-width: 64px; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .2rem; font-size: .6rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; color: #fff; }
    .swipe-action.edit { background: var(--acc); }
    .swipe-action.del  { background: var(--red); }
    .wine-card { background: var(--card); border: 1px solid var(--border); padding: .85rem; display: grid; grid-template-columns: 54px 1fr; gap: .85rem; align-items: start; cursor: pointer; border-radius: var(--r); -webkit-tap-highlight-color: transparent; transition: background .12s, transform .12s; user-select: none; position: relative; }
    .wine-card:active { background: var(--card-hover); }
    .wine-card-wrap.swiped .wine-card { border-radius: var(--r) 0 0 var(--r); }
    .wine-thumb { width: 54px; height: 70px; border: 1px solid var(--border); background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 1.3rem; flex-shrink: 0; overflow: hidden; border-radius: var(--r-xs); }
    .wine-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .wine-info { overflow: hidden; min-width: 0; }
    .wine-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--text); line-height: 1.25; margin-bottom: .18rem; }
    .wine-producer { font-size: .65rem; font-weight: 400; color: var(--text2); margin-bottom: .3rem; }
    .wine-meta { display: flex; flex-wrap: wrap; gap: .25rem; align-items: center; margin-bottom: .28rem; }
    .badge { font-size: .55rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; padding: .1rem .38rem; border-radius: 4px; }
    .badge-gray { background: var(--bg3); color: var(--text2); }
    .badge-gold { background: rgba(232,184,109,.12); color: var(--gold); }
    .badge-blue { background: rgba(79,110,247,.12); color: var(--acc); }
    .wine-footer { display: flex; align-items: center; justify-content: space-between; }
    .wine-stars { display: flex; gap: 1px; }
    .star { color: var(--bg3); font-size: .72rem; }
    .star.on { color: var(--gold); }
    .wine-date { font-size: .58rem; color: var(--text3); }
    .wine-price-tag { font-size: .65rem; font-weight: 500; color: var(--green); }
    .wine-notes-prev { font-size: .7rem; color: var(--text3); font-style: italic; margin-top: .22rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Cormorant Garamond', serif; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 4rem 1rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .2; }
    .empty-text { font-size: 1rem; color: var(--text2); margin-bottom: .3rem; }
    .empty-sub { font-size: .7rem; color: var(--text3); }

    /* ── MODAL base ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .sheet { background: var(--bg2); border: 1px solid var(--border); border-bottom: none; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; border-radius: 20px 20px 0 0; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: .75rem auto .2rem; }
    .sheet-head { padding: .7rem 1rem .8rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg2); z-index: 10; }
    .sheet-title { font-size: 1rem; font-weight: 600; color: var(--text); }

<body>
<div id="app"></div>
<script>
'use strict';

// ─── THEMES ──────────────────────────────────────────────────────────────────
const THEMES = {
  dark:     { name:'Scuro',    light:false, acc:'#4f6ef7', gold:'#e8b86d', bg:'#111318', swatch:'linear-gradient(135deg,#111318,#4f6ef7)' },
  light:    { name:'Chiaro',   light:true,  acc:'#4f6ef7', gold:'#c47f20', bg:'#f0f2f7', swatch:'linear-gradient(135deg,#e8ebf2,#4f6ef7)' },
  bordeaux: { name:'Bordeaux', light:false, acc:'#8b2a3d', gold:'#c9a84c', bg:'#0a0507', swatch:'linear-gradient(135deg,#0a0507,#8b2a3d,#c9a84c)' },
  forest:   { name:'Foresta',  light:false, acc:'#3a7a40', gold:'#8ab870', bg:'#060a07', swatch:'linear-gradient(135deg,#060a07,#3a7a40,#8ab870)' },
  amber:    { name:'Ambra',    light:false, acc:'#c47020', gold:'#e0c050', bg:'#080600', swatch:'linear-gradient(135deg,#080600,#c47020,#e0c050)' },
  ice:      { name:'Ghiaccio', light:true,  acc:'#3a5fa8', gold:'#6878a8', bg:'#f4f6fa', swatch:'linear-gradient(135deg,#f4f6fa,#3a5fa8)' },
};

const THEME_VARS = {
  dark:     { '--bg':'#111318','--bg2':'#1a1d24','--bg3':'#22262f','--acc':'#4f6ef7','--acc-l':'#6b85f8','--gold':'#e8b86d','--gold-l':'#f5d08a','--gold-dim':'rgba(232,184,109,0.1)','--text':'#e8eaf0','--text2':'#9ca3b0','--text3':'#5a6070','--border':'rgba(255,255,255,0.08)','--border2':'rgba(255,255,255,0.14)','--card':'#1e2129','--card-hover':'#252930','--green':'#4caf82','--red':'#e05252','--amber':'#e8943a' },
  light:    { '--bg':'#f0f2f7','--bg2':'#ffffff','--bg3':'#e8ebf2','--acc':'#4f6ef7','--acc-l':'#3d5be0','--gold':'#c47f20','--gold-l':'#a86b12','--gold-dim':'rgba(196,127,32,0.1)','--text':'#1a1d24','--text2':'#4a5060','--text3':'#9ca3b0','--border':'rgba(0,0,0,0.08)','--border2':'rgba(0,0,0,0.14)','--card':'#ffffff','--card-hover':'#f5f7fc','--green':'#2e8a5e','--red':'#c0392b','--amber':'#c47020' },
  bordeaux: { '--bg':'#0a0507','--bg2':'#110809','--bg3':'#1a0e10','--acc':'#8b2a3d','--acc-l':'#a83548','--gold':'#c9a84c','--gold-l':'#e2c278','--gold-dim':'rgba(201,168,76,0.1)','--text':'#f0e8d8','--text2':'#9a8878','--text3':'#5a4840','--border':'rgba(201,168,76,0.15)','--border2':'rgba(201,168,76,0.25)','--card':'#130a0d','--card-hover':'#1c1013','--green':'#7ab87a','--red':'#e05252','--amber':'#e8943a' },
  forest:   { '--bg':'#060a07','--bg2':'#0a0f0b','--bg3':'#101810','--acc':'#3a7a40','--acc-l':'#4a9a50','--gold':'#8ab870','--gold-l':'#b0d898','--gold-dim':'rgba(138,184,112,0.1)','--text':'#e8f0e0','--text2':'#8aaa80','--text3':'#4a6040','--border':'rgba(138,184,112,0.14)','--border2':'rgba(138,184,112,0.24)','--card':'#0e140f','--card-hover':'#141e15','--green':'#6ab870','--red':'#e05252','--amber':'#e8943a' },
  amber:    { '--bg':'#080600','--bg2':'#100e00','--bg3':'#181500','--acc':'#c47020','--acc-l':'#d88030','--gold':'#e0c050','--gold-l':'#f0d870','--gold-dim':'rgba(224,192,80,0.1)','--text':'#f8f0d8','--text2':'#a89060','--text3':'#685840','--border':'rgba(224,192,80,0.14)','--border2':'rgba(224,192,80,0.24)','--card':'#100e00','--card-hover':'#181500','--green':'#8ab870','--red':'#e05252','--amber':'#e8943a' },
  ice:      { '--bg':'#f4f6fa','--bg2':'#ffffff','--bg3':'#edf0f5','--acc':'#3a5fa8','--acc-l':'#2a4f98','--gold':'#6878a8','--gold-l':'#485888','--gold-dim':'rgba(104,120,168,0.1)','--text':'#1a2040','--text2':'#5a6888','--text3':'#9aa8c8','--border':'rgba(58,95,168,0.12)','--border2':'rgba(58,95,168,0.22)','--card':'#ffffff','--card-hover':'#f0f4fa','--green':'#2e7a5e','--red':'#c0392b','--amber':'#c07020' },
};

// ─── SECTIONS ────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id:'bevuti',    label:'Bevuti',    icon:'🍷' },
  { id:'wishlist',  label:'Wishlist',  icon:'✦'  },
  { id:'preferiti', label:'Preferiti', icon:'★'  },
  { id:'stats',     label:'Statistiche', icon:'📊' },
];
const WINE_SECTIONS = ['bevuti','wishlist','preferiti'];

const WHERE_OPTIONS = ['Enoteca','Cantina diretta','Supermercato','Online','Ristorante','Regalo'];
const CLASSIFICATIONS = ['DOCG','DOC','IGT','IGP','VdT','AOC','AOP','Vin de France','QbA','Prädikatswein','DO','DOCa'];

// ─── INDEXEDDB ───────────────────────────────────────────────────────────────
let db = null;
async function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('vinlog_db', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('wines')) d.createObjectStore('wines', { keyPath:'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror   = () => rej(r.error);
  });
}
async function dbGetAll() {
  return new Promise((res, rej) => {
    const r = db.transaction('wines','readonly').objectStore('wines').getAll();
    r.onsuccess = () => res(r.result || []);
    r.onerror   = () => rej(r.error);
  });
}
async function dbPutAll(wines) {
  return new Promise((res, rej) => {
    const tx = db.transaction('wines','readwrite');
    const st = tx.objectStore('wines');
    st.clear();
    wines.forEach(w => st.put(w));
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  });
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let _saveTimer = null;
const state = new Proxy({
  wines:[], tab:'bevuti', modal:null,
  form: emptyForm('bevuti'), editId:null, detail:null, lightbox:null,
  toast:null, toastTimer:null,
  search:'', sort:'data',
  filters:{ region:'', grape:'', classification:'', minRating:0, where:'' },
  theme: localStorage.getItem('vinlog_theme') || 'dark',
  storageInfo: null,
  swipedId: null,
}, {
  set(t, k, v) {
    t[k] = v;
    requestAnimationFrame(render);
    if (k === 'wines') {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => dbPutAll(t.wines).catch(console.error), 300);
    }
    return true;
  }
});

function emptyForm(list) {
  return { name:'', producer:'', region:'', classification:'', grape:'', vintage:'',
           price:'', priceType:'bottiglia', rating:0, notes:'', image:'', where:'',
           list: list || 'bevuti', addedAt: new Date().toISOString() };
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function applyTheme(id) {
  const vars = THEME_VARS[id] || THEME_VARS.dark;
  const r = document.documentElement.style;
  Object.entries(vars).forEach(([k,v]) => r.setProperty(k,v));
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', vars['--bg']);
  document.body.className = THEMES[id]?.light ? 'theme-light' : '';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let _rendering = false;
function render() {
  if (_rendering) return;
  _rendering = true;
  applyTheme(state.theme);
  morphdom(document.getElementById('app'), `<div id="app">${buildApp()}</div>`, {
    onBeforeElUpdated(from, to) {
      if (from === document.activeElement &&
          (from.tagName === 'INPUT' || from.tagName === 'TEXTAREA')) return false;
      return true;
    }
  });
  bindSwipe();
  _rendering = false;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function stars(n, total=5, cls='star') {
  return Array.from({length:total}, (_,i) => `<span class="${cls}${i<n?' on':''}"">★</span>`).join('');
}
function count(id) {
  if (id==='preferiti') return state.wines.filter(w=>w.fav).length;
  return state.wines.filter(w=>w.list===id).length;
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
function hasActiveFilters() {
  const f = state.filters;
  return f.region||f.grape||f.classification||f.minRating>0||f.where;
}
function getFiltered() {
  let list = state.tab==='preferiti'
    ? state.wines.filter(w=>w.fav)
    : state.wines.filter(w=>w.list===state.tab);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(w=>[w.name,w.producer,w.region,w.grape,w.where].some(s=>(s||'').toLowerCase().includes(q)));
  }
  const f = state.filters;
  if (f.region)         list = list.filter(w=>(w.region||'').toLowerCase().includes(f.region.toLowerCase()));
  if (f.grape)          list = list.filter(w=>(w.grape||'').toLowerCase().includes(f.grape.toLowerCase()));
  if (f.classification) list = list.filter(w=>w.classification===f.classification);
  if (f.minRating>0)    list = list.filter(w=>w.rating>=f.minRating);
  if (f.where)          list = list.filter(w=>w.where===f.where);

  const sorters = {
    nome:   (a,b)=>a.name.localeCompare(b.name),
    voto:   (a,b)=>(b.rating||0)-(a.rating||0),
    annata: (a,b)=>(b.vintage||0)-(a.vintage||0),
    prezzo: (a,b)=>(parseFloat(a.price)||0)-(parseFloat(b.price)||0),
    data:   (a,b)=>new Date(b.addedAt||0)-new Date(a.addedAt||0),
  };
  if (sorters[state.sort]) list = [...list].sort(sorters[state.sort]);
  return list;
}

// ─── STATISTICS HELPERS ───────────────────────────────────────────────────────
function computeStats() {
  const wines = state.wines;
  const bevuti = wines.filter(w=>w.list==='bevuti');
  const withRating = wines.filter(w=>w.rating>0);
  const withPrice  = wines.filter(w=>w.price&&!isNaN(parseFloat(w.price)));
  const totalSpent = withPrice.reduce((s,w)=>s+parseFloat(w.price),0);
  const avgRating  = withRating.length ? (withRating.reduce((s,w)=>s+w.rating,0)/withRating.length).toFixed(1) : null;
  const avgPrice   = withPrice.length ? (totalSpent/withPrice.length).toFixed(1) : null;

  // by region
  const byRegion = {};
  wines.forEach(w=>{ if(w.region){ byRegion[w.region]=(byRegion[w.region]||0)+1; } });
  const topRegions = Object.entries(byRegion).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // by grape
  const byGrape = {};
  wines.forEach(w=>{ if(w.grape){ byGrape[w.grape]=(byGrape[w.grape]||0)+1; } });
  const topGrapes = Object.entries(byGrape).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // by where
  const byWhere = {};
  wines.forEach(w=>{ if(w.where){ byWhere[w.where]=(byWhere[w.where]||0)+1; } });
  const whereEntries = Object.entries(byWhere).sort((a,b)=>b[1]-a[1]);

  // rating distribution
  const ratingDist = [1,2,3,4,5].map(n=>({ n, count: wines.filter(w=>w.rating===n).length }));

  // monthly trend (last 6 months)
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const label = d.toLocaleDateString('it-IT',{month:'short'});
    const cnt = wines.filter(w=>{
      if(!w.addedAt) return false;
      const wd = new Date(w.addedAt);
      return wd.getFullYear()===d.getFullYear() && wd.getMonth()===d.getMonth();
    }).length;
    months.push({label,cnt});
  }

  return { total:wines.length, bevuti:bevuti.length, wishlist:count('wishlist'),
           preferiti:count('preferiti'), avgRating, avgPrice, totalSpent:totalSpent.toFixed(0),
           topRegions, topGrapes, whereEntries, ratingDist, months };
}

function buildStats() {
  if (!state.wines.length) return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Nessuna statistica ancora</div><div class="empty-sub">Aggiungi qualche vino prima</div></div>`;
  const s = computeStats();
  const maxRegion = s.topRegions[0]?.[1] || 1;
  const maxGrape  = s.topGrapes[0]?.[1]  || 1;
  const maxRating = Math.max(...s.ratingDist.map(r=>r.count), 1);
  const maxMonth  = Math.max(...s.months.map(m=>m.cnt), 1);
  const PIE_COLORS = ['#4f6ef7','#e8b86d','#4caf82','#e05252','#e8943a','#9b59b6'];

  return `
    <div class="stats-section">
      <div class="stats-section-title">Panoramica</div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-val accent">${s.total}</div><div class="kpi-label">Vini totali</div></div>
        <div class="kpi-card"><div class="kpi-val accent">${s.bevuti}</div><div class="kpi-label">Bevuti</div></div>
        <div class="kpi-card"><div class="kpi-val${s.avgRating?' accent':''}">${s.avgRating||'—'}</div><div class="kpi-label">Media punteggio</div></div>
        <div class="kpi-card"><div class="kpi-val green">${s.totalSpent>0?'€'+s.totalSpent:'—'}</div><div class="kpi-label">Spesa totale</div></div>
      </div>
    </div>

    ${s.months.some(m=>m.cnt>0)?`
    <div class="stats-section">
      <div class="stats-section-title">Aggiunti per mese</div>
      <div class="bar-chart">
        ${s.months.map(m=>`
          <div class="bar-row">
            <div class="bar-label">${m.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${m.cnt?Math.round(m.cnt/maxMonth*100):0}%"></div></div>
            <div class="bar-val">${m.cnt}</div>
          </div>
        `).join('')}
      </div>
    </div>`:''}

    <div class="stats-section">
      <div class="stats-section-title">Distribuzione punteggi</div>
      <div class="bar-chart">
        ${s.ratingDist.map(r=>`
          <div class="bar-row">
            <div class="bar-label">${'★'.repeat(r.n)}</div>
            <div class="bar-track"><div class="bar-fill gold" style="width:${r.count?Math.round(r.count/maxRating*100):0}%"></div></div>
            <div class="bar-val">${r.count}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${s.topRegions.length?`
    <div class="stats-section">
      <div class="stats-section-title">Top regioni</div>
      <div class="bar-chart">
        ${s.topRegions.map(([r,n])=>`
          <div class="bar-row">
            <div class="bar-label">${esc(r)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxRegion*100)}%"></div></div>
            <div class="bar-val">${n}</div>
          </div>
        `).join('')}
      </div>
    </div>`:''}

    ${s.topGrapes.length?`
    <div class="stats-section">
      <div class="stats-section-title">Vitigni più bevuti</div>
      <div class="bar-chart">
        ${s.topGrapes.map(([g,n])=>`
          <div class="bar-row">
            <div class="bar-label">${esc(g)}</div>
            <div class="bar-track"><div class="bar-fill green" style="width:${Math.round(n/maxGrape*100)}%"></div></div>
            <div class="bar-val">${n}</div>
          </div>
        `).join('')}
      </div>
    </div>`:''}

    ${s.whereEntries.length?`
    <div class="stats-section">
      <div class="stats-section-title">Dove acquisto di più</div>
      <div class="donut-wrap">
        <svg width="90" height="90" viewBox="0 0 90 90">
          ${(()=>{
            const total = s.whereEntries.reduce((a,b)=>a+b[1],0);
            let offset = 0;
            const r=32,cx=45,cy=45,circ=2*Math.PI*r;
            return s.whereEntries.map(([,n],i)=>{
              const pct=n/total;
              const dash=pct*circ;
              const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${PIE_COLORS[i%PIE_COLORS.length]}" stroke-width="14" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset*circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
              offset+=pct; return el;
            }).join('');
          })()}
        </svg>
        <div class="pie-legend">
          ${s.whereEntries.map(([w,n],i)=>`
            <div class="pie-legend-item">
              <div class="pie-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></div>
              ${esc(w)} (${n})
            </div>
          `).join('')}
        </div>
      </div>
    </div>`:''}
  `;
}

function buildSettings() {
  const si = state.storageInfo;
  return `
    <div class="overlay" data-action="closeModal">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <div class="sheet-title">Impostazioni</div>
          <button class="sheet-close" data-action="closeModal">✕</button>
        </div>
        <div class="sheet-body">
          <div class="sett-section">
            <div class="sett-title">Tema</div>
            <div class="theme-grid">
              ${Object.entries(THEMES).map(([id,t])=>`
                <div class="theme-card${state.theme===id?' active':''}" data-action="setTheme" data-theme="${id}">
                  <div class="theme-swatch" style="background:${t.swatch}"></div>
                  <div class="theme-name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="sett-section">
            <div class="sett-title">Backup & Ripristino</div>
            <div class="sett-row">
              <button class="sett-btn" data-action="exportJSON">↓ Esporta JSON</button>
              <button class="sett-btn" data-action="triggerImport">↑ Importa JSON</button>
              <input type="file" id="import-input" accept=".json" style="display:none"/>
            </div>
            ${si?`<div class="storage-row"><span>💾 ${si.count} vini · ~${si.sizeMB} MB · ${si.images} foto</span></div>`:''}
          </div>
          <div class="sett-section">
            <div class="sett-row"><button class="sett-btn danger" data-action="clearAll">✕ Svuota tutto</button></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildLightbox() {
  return `<div class="lightbox" data-action="closeLightbox">
    <img src="${state.lightbox}" alt=""/>
    <button class="lightbox-close" data-action="closeLightbox">✕</button>
  </div>`;
}

// ─── SWIPE ───────────────────────────────────────────────────────────────────
function bindSwipe() {
  document.querySelectorAll('.wine-card-wrap').forEach(wrap => {
    if (wrap._swipeBound) return;
    wrap._swipeBound = true;
    let startX=0, startY=0, dragging=false;
    const THRESHOLD = 60;

    wrap.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dragging = true;
    }, { passive:true });

    wrap.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dy) > Math.abs(dx)) { dragging=false; return; }
    }, { passive:true });

    wrap.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dx = e.changedTouches[0].clientX - startX;
      const id = parseInt(wrap.dataset.id);
      if (dx < -THRESHOLD) {
        state.swipedId = id;
      } else if (dx > THRESHOLD/2) {
        if (state.swipedId === id) state.swipedId = null;
      }
    }, { passive:true });
  });

  // Close swipe on outside tap
  document.getElementById('app')?.addEventListener('click', e => {
    if (state.swipedId && !e.target.closest('.wine-card-wrap')) {
      state.swipedId = null;
    }
  }, { once: true });
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
let _eventsBound = false;
function bindEvents() {
  if (_eventsBound) return;
  _eventsBound = true;
  const root = document.getElementById('app');
  root.addEventListener('click',  handleClick);
  root.addEventListener('change', handleChange);
  root.addEventListener('input',  handleInput);
}

function handleInput(e) {
  if (e.target.id === 'search-input') {
    state.search = e.target.value;
    // Update only content
    const content = document.querySelector('.content');
    if (content) {
      const filtered = getFiltered();
      const strip = buildStatsStrip();
      content.innerHTML = (state.wines.length && state.tab!=='preferiti' ? strip : '') +
        (filtered.length===0
          ? `<div class="empty"><div class="empty-icon">🍷</div><div class="empty-text">Nessun risultato</div><div class="empty-sub">Prova a cambiare i filtri</div></div>`
          : `<div class="wines-grid">${filtered.map(buildCard).join('')}</div>`);
      bindSwipe();
    }
    return;
  }
  const formFields = ['f-name','f-producer','f-region','f-vintage','f-price','f-notes','f-grape'];
  if (formFields.includes(e.target.id)) syncFormSilent();
}

function syncFormSilent() {
  const g = id => { const el=document.getElementById(id); return el?el.value:''; };
  const cl = document.getElementById('f-classification');
  const wh = document.getElementById('f-where');
  Object.assign(state.form, {
    name:g('f-name'), producer:g('f-producer'), region:g('f-region'),
    grape:g('f-grape'), vintage:g('f-vintage'), price:g('f-price'), notes:g('f-notes'),
    classification: cl?cl.value:'', where: wh?wh.value:'',
  });
}

function handleChange(e) {
  if (e.target.id==='f-classification'||e.target.id==='f-where') syncFormSilent();
  if (e.target.id==='img-input') {
    const file=e.target.files[0]; if(!file) return;
    compressImage(file,800).then(b64=>{ state.form.image=b64; render(); });
  }
  if (e.target.id==='import-input') {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error();
        state.wines=data; showToast(`✓ ${data.length} vini importati`); state.modal=null;
      } catch { showToast('✗ File non valido'); }
    };
    r.readAsText(file); e.target.value='';
  }
}

const SORT_CYCLE = ['data','nome','voto','annata','prezzo'];

function handleClick(e) {
  const btn = e.target.closest('[data-action]'); if(!btn) return;
  const action = btn.dataset.action;

  // Close swipe on any tap
  if (state.swipedId && action !== 'editWine' && action !== 'delWine') {
    state.swipedId = null; if(action==='openDetail') return;
  }

  switch(action) {
    case 'setTab': state.tab=btn.dataset.tab; state.search=''; break;
    case 'openAdd':
      state.form=emptyForm(WINE_SECTIONS.includes(state.tab)?state.tab:'bevuti');
      state.editId=null; state.modal='add'; break;
    case 'openSettings':
      computeStorageInfo().then(si=>{ state.storageInfo=si; state.modal='settings'; });
      break;
    case 'openFilter': state.modal='filter'; break;
    case 'closeModal':
      if(e.target===btn||btn.classList.contains('sheet-close')||e.target.classList.contains('overlay'))
        { state.modal=null; state.detail=null; }
      break;
    case 'closeLightbox': state.lightbox=null; break;
    case 'openLightbox': if(state.detail?.image) state.lightbox=state.detail.image; break;
    case 'setFormList': syncFormSilent(); state.form={...state.form,list:btn.dataset.list}; break;
    case 'setRating': { syncFormSilent(); const v=parseInt(btn.dataset.val); state.form={...state.form,rating:state.form.rating===v?0:v}; break; }
    case 'setPriceType': syncFormSilent(); state.form={...state.form,priceType:btn.dataset.val}; break;
    case 'triggerImg': document.getElementById('img-input')?.click(); break;
    case 'cycleSort': { const ci=SORT_CYCLE.indexOf(state.sort); state.sort=SORT_CYCLE[(ci+1)%SORT_CYCLE.length]; break; }
    case 'setFilter': {
      const key=btn.dataset.key, val=btn.dataset.val;
      const cur = state.filters[key];
      const newVal = key==='minRating' ? (cur===parseInt(val)?0:parseInt(val)) : (cur===val?'':val);
      state.filters={...state.filters,[key]:newVal};
      break;
    }
    case 'clearFilters': state.filters={region:'',grape:'',classification:'',minRating:0,where:''}; break;
    case 'saveWine': {
      syncFormSilent();
      if(!state.form.name.trim()){showToast('✗ Inserisci il nome del vino');return;}
      const entry={...state.form,id:state.editId||Date.now(),addedAt:state.form.addedAt||new Date().toISOString()};
      state.wines=state.editId?state.wines.map(w=>w.id===state.editId?entry:w):[...state.wines,entry];
      state.modal=null; state.editId=null; showToast('✓ Vino salvato');
      break;
    }
    case 'openDetail': state.detail=state.wines.find(w=>w.id==btn.dataset.id); state.modal='detail'; break;
    case 'editWine': { e.stopPropagation(); const w=state.wines.find(x=>x.id==btn.dataset.id); if(w){state.form={...w};state.editId=w.id;state.modal='add';state.swipedId=null;} break; }
    case 'editFromDetail': if(state.detail){state.form={...state.detail};state.editId=state.detail.id;state.modal='add';} break;
    case 'delWine': e.stopPropagation();
      if(confirm('Eliminare questo vino?')){state.wines=state.wines.filter(w=>w.id!=btn.dataset.id);state.swipedId=null;} break;
    case 'toggleFav': e.stopPropagation(); state.wines=state.wines.map(w=>w.id==btn.dataset.id?{...w,fav:!w.fav}:w); break;
    case 'toggleFavDetail':
      if(state.detail){state.wines=state.wines.map(w=>w.id===state.detail.id?{...w,fav:!w.fav}:w);state.detail={...state.detail,fav:!state.detail.fav};} break;
    case 'moveSection':
      if(state.detail){const s=btn.dataset.section;state.wines=state.wines.map(w=>w.id===state.detail.id?{...w,list:s}:w);state.detail={...state.detail,list:s};showToast(`✓ Spostato in ${s}`);} break;
    case 'setTheme': state.theme=btn.dataset.theme; localStorage.setItem('vinlog_theme',state.theme); break;
    case 'exportJSON': {
      const json=JSON.stringify(state.wines,null,2);
      const b=new Blob([json],{type:'application/json'});
      const u=URL.createObjectURL(b);const a=document.createElement('a');
      a.href=u;a.download='vinlog_backup.json';a.click();URL.revokeObjectURL(u);
      localStorage.setItem('vinlog_last_backup',String(Date.now()));
      showToast(`✓ Backup esportato (${(json.length/1048576).toFixed(1)} MB)`);
      break;
    }
    case 'triggerImport': document.getElementById('import-input')?.click(); break;
    case 'clearAll':
      if(confirm('Eliminare tutti i vini? Non è reversibile.')){state.wines=[];state.modal=null;showToast('✓ Svuotato');} break;
  }
}

function showToast(msg) {
  if(state.toastTimer) clearTimeout(state.toastTimer);
  Object.assign(state,{toast:msg}); render();
  state.toastTimer=setTimeout(()=>{Object.assign(state,{toast:null});render();},2500);
}
async function computeStorageInfo() {
  const json=JSON.stringify(state.wines);
  return { count:state.wines.length, sizeMB:(new TextEncoder().encode(json).length/1048576).toFixed(2), images:state.wines.filter(w=>w.image).length };
}
function compressImage(file,maxW) {
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const ratio=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*ratio; c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',.82));
    };
    img.src=url;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    await openDB();
    const wines = await dbGetAll();
    Object.assign(state, { wines });
  } catch(err) {
    console.warn('IndexedDB unavailable, fallback to localStorage', err);
    try { const s=localStorage.getItem('cantina_v1')||localStorage.getItem('vinlog_v1'); if(s) Object.assign(state,{wines:JSON.parse(s)}); } catch{}
  }
  render();
  bindEvents();
  checkBackup();
}

function checkBackup() {
  if(!state.wines.length) return;
  const last=parseInt(localStorage.getItem('vinlog_last_backup')||'0');
  const now=Date.now();
  if(!last||(now-last)/86400000>=7) {
    setTimeout(()=>{
      if(confirm(`💾 Backup settimanale\n${state.wines.length} vini da esportare. Vuoi procedere?`)) {
        const b=new Blob([JSON.stringify(state.wines,null,2)],{type:'application/json'});
        const u=URL.createObjectURL(b);const a=document.createElement('a');
        a.href=u;a.download='vinlog_backup.json';a.click();URL.revokeObjectURL(u);
        localStorage.setItem('vinlog_last_backup',String(now));
        showToast('✓ Backup salvato');
      } else { localStorage.setItem('vinlog_last_backup',String(now)); }
    },1000);
  }
}

init();
</script>
